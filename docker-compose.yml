services:
  raspberry-docker:
    image: docker:27-dind
    container_name: raspberry-docker
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      - "8081:8081"
    volumes:
      - raspberry_docker:/var/lib/docker

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    user: root
    depends_on:
      - raspberry-docker
    environment:
      DOCKER_HOST: tcp://raspberry-docker:2375
    ports:
      - "8085:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home:
  raspberry_docker:
